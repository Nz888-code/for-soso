<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>💘 For Soso</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to bottom, #cce6ff, #ffffff);
      overflow: hidden;
    }

    .card {
      margin-top: 120px;
    }

    h1 {
      color: #1a75ff;
    }

    p {
      font-size: 18px;
      color: #333;
    }

    button {
      padding: 10px 20px;
      background: #1a75ff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }

    .heart {
      position: absolute;
      font-size: 24px;
      animation: float 6s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-700px); opacity: 0; }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>💘 გამარჯობა სოსო</h1>
    <p>მინდა რაღაც პატარა გაჩვენო…</p>

    <a href="page2.html">
      <button>დააჭირე 💌</button>
    </a>
  </div>

  <div class="heart" style="left:15%;">💘</div>
  <div class="heart" style="left:40%; animation-delay:1s;">💘</div>
  <div class="heart" style="left:65%; animation-delay:2s;">💘</div>

</body>
</html>
